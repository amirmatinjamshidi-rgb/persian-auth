<style>
   body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: rgb(14, 11, 11);
    }

    .container {
        background-color: rgb(20, 20, 22);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 120px 20px;
        width: 100%;
        max-width: 1200px;
        box-sizing: border-box;
    }

    .tag {
        display: inline-block;
        width: 100px;
        height: 100px;
        line-height: 100px;
        text-align: center;
        text-decoration: none;
        color: #0ff;
  font-size: 2rem;
  position: relative;
  z-index: 2;
         width: 300px;
  height: 200px;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  border-radius: 15px;
  transition: all 0.5s ease
        
    }
    .tag::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    0deg, 
    transparent, 
    transparent 30%, 
    rgba(0,255,255,0.3)
  );
  transform: rotate(-45deg);
  transition: all 0.5s ease;
  opacity: 0;
}
    .tag:hover {
        background-color: #007bff;
        color: #ffffff;
        border: 2px solid #ffffff;
         transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
    }
    .tag:hover:before {
  opacity: 1;
  transform: rotate(-45deg) translateY(100%);
    }
    @media (max-width: 768px) {
        .tag {
            flex: 0 0 calc(33.33% - 20px); 
        }
    }
    @media (max-width: 480px) {
        .tag {
            flex: 0 0 calc(50% - 20px);
        }
    }
</style>
